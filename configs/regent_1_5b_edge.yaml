# Regent 1.5B — Edge deployment (robot, drone, wearable bodies)
# Target: embedded GPU (Jetson, M-series Mac), ~3GB memory

model:
  d_model: 2048
  n_layer: 48
  vocab_size: 32768

  ssm:
    expand: 2            # d_inner = 4096
    d_state: 64
    d_conv: 4
    n_heads: 32          # head_dim = 128

  attention:
    layers: [7, 15, 23, 31, 39, 47]
    n_q_heads: 16
    n_kv_heads: 4
    head_dim: 128
    window_size: 1024

  gen_head:
    tie_embeddings: true

  ver_head:
    hidden_dim: 192
    enabled: true

  epg_encoder:
    max_nodes: 32
    scalar_features: 5
    n_categories: 15
    category_embed_dim: 12
    n_encoder_layers: 2
    encoder_heads: 4

  essence:
    input_dim: 7
    inject_every_n: 8

  norm_eps: 1.0e-5
  initializer_range: 0.02

training:
  max_seq_len: 2048
  batch_size: 4
  gradient_accumulation: 8
  lr: 2.0e-4
  min_lr: 2.0e-5
  warmup_steps: 1500
  max_steps: 300000
  weight_decay: 0.1
  grad_clip: 1.0
  dtype: float16

  ver_head:
    lr: 8.0e-5
    freeze_backbone: true
    epochs: 8
