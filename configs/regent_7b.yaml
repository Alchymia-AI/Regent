# Regent 7B — Full production model
# Target: server deployment, multi-GPU training

model:
  d_model: 4096
  n_layer: 64
  vocab_size: 32768

  ssm:
    expand: 2            # d_inner = 8192
    d_state: 128
    d_conv: 4
    n_heads: 64          # head_dim = 128

  attention:
    layers: [7, 15, 23, 31, 39, 47, 55]
    n_q_heads: 32
    n_kv_heads: 8
    head_dim: 128
    window_size: 2048

  gen_head:
    tie_embeddings: true

  ver_head:
    hidden_dim: 256
    enabled: true

  epg_encoder:
    max_nodes: 64
    scalar_features: 5
    n_categories: 15
    category_embed_dim: 16
    n_encoder_layers: 4
    encoder_heads: 8

  essence:
    input_dim: 7
    inject_every_n: 8

  norm_eps: 1.0e-5
  initializer_range: 0.02

training:
  max_seq_len: 4096
  batch_size: 8
  gradient_accumulation: 8
  lr: 1.5e-4
  min_lr: 1.5e-5
  warmup_steps: 2000
  max_steps: 500000
  weight_decay: 0.1
  grad_clip: 1.0
  dtype: float16

  ver_head:
    lr: 5.0e-5
    freeze_backbone: true
    epochs: 10
