<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 720" font-family="Inter, -apple-system, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#64748b"/>
    </marker>
    <marker id="arrow-purple" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#7c3aed"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#059669"/>
    </marker>
    <marker id="arrow-blue" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M0,0 L8,3 L0,6" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="720" fill="#ffffff"/>

  <!-- Title -->
  <text x="450" y="40" text-anchor="middle" fill="#0f172a" font-size="20" font-weight="700">Regent Architecture</text>
  <text x="450" y="62" text-anchor="middle" fill="#64748b" font-size="12">Mamba-2 SSM with Grouped-Query Attention, Verification Head, and EPG Encoder</text>

  <!-- ============ INPUT LAYER ============ -->

  <!-- EPG Nodes -->
  <rect x="40" y="95" width="160" height="48" rx="8" fill="#f5f3ff" stroke="#7c3aed" stroke-width="1.5"/>
  <text x="120" y="115" text-anchor="middle" fill="#7c3aed" font-size="10" font-weight="700">EPG NODES</text>
  <text x="120" y="131" text-anchor="middle" fill="#6b7280" font-size="10">typed, scored, categorized</text>

  <!-- EPG Encoder -->
  <rect x="260" y="95" width="130" height="48" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="325" y="123" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">EPG Encoder</text>

  <!-- Arrow: EPG Nodes → EPG Encoder -->
  <line x1="200" y1="119" x2="252" y2="119" stroke="#7c3aed" stroke-width="1.5" marker-end="url(#arrow-purple)"/>

  <!-- Prefix Tokens -->
  <rect x="450" y="95" width="120" height="48" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="510" y="123" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">Prefix Tokens</text>

  <!-- Arrow: EPG Encoder → Prefix Tokens -->
  <line x1="390" y1="119" x2="442" y2="119" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Essence Vector -->
  <rect x="40" y="160" width="160" height="48" rx="8" fill="#ecfdf5" stroke="#059669" stroke-width="1.5"/>
  <text x="120" y="180" text-anchor="middle" fill="#059669" font-size="10" font-weight="700">ESSENCE VECTOR</text>
  <text x="120" y="196" text-anchor="middle" fill="#6b7280" font-size="10">7 scalars, injected every 8 layers</text>

  <!-- Token IDs -->
  <rect x="40" y="225" width="160" height="48" rx="8" fill="#eff6ff" stroke="#2563eb" stroke-width="1.5"/>
  <text x="120" y="245" text-anchor="middle" fill="#2563eb" font-size="10" font-weight="700">TOKEN IDS</text>
  <text x="120" y="261" text-anchor="middle" fill="#6b7280" font-size="10">input sequence</text>

  <!-- Embedding -->
  <rect x="260" y="225" width="130" height="48" rx="8" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="325" y="253" text-anchor="middle" fill="#1f2937" font-size="12" font-weight="500">Embedding</text>

  <!-- Arrow: Token IDs → Embedding -->
  <line x1="200" y1="249" x2="252" y2="249" stroke="#2563eb" stroke-width="1.5" marker-end="url(#arrow-blue)"/>

  <!-- Concatenate -->
  <rect x="630" y="155" width="120" height="50" rx="8" fill="#fafafa" stroke="#d97706" stroke-width="1.5"/>
  <text x="690" y="184" text-anchor="middle" fill="#d97706" font-size="12" font-weight="600">Concatenate</text>

  <!-- Arrow: Prefix Tokens → Concatenate -->
  <line x1="570" y1="119" x2="610" y2="119" stroke="#64748b" stroke-width="1.5"/>
  <line x1="610" y1="119" x2="610" y2="180" stroke="#64748b" stroke-width="1.5"/>
  <line x1="610" y1="180" x2="622" y2="180" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Arrow: Embedding → Concatenate -->
  <line x1="390" y1="249" x2="610" y2="249" stroke="#64748b" stroke-width="1.5"/>
  <line x1="610" y1="249" x2="610" y2="180" stroke="#64748b" stroke-width="1.5"/>

  <!-- Arrow: Essence Vector → label -->
  <line x1="200" y1="184" x2="460" y2="184" stroke="#059669" stroke-width="1" stroke-dasharray="6,3" marker-end="url(#arrow-green)"/>
  <text x="470" y="180" fill="#059669" font-size="9" font-weight="500">injected every 8 layers</text>

  <!-- ============ HYBRID BACKBONE ============ -->

  <!-- Main backbone box -->
  <rect x="250" y="305" width="400" height="220" rx="10" fill="#fafbff" stroke="#4f46e5" stroke-width="2"/>

  <!-- Backbone title -->
  <text x="450" y="333" text-anchor="middle" fill="#1e1b4b" font-size="15" font-weight="700">Hybrid Backbone</text>
  <text x="450" y="351" text-anchor="middle" fill="#4f46e5" font-size="11">Mamba-2 State-Space Model + Grouped-Query Attention</text>

  <!-- Layer blocks -->
  <rect x="280" y="370" width="155" height="32" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="357" y="390" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="500">Layers 1-7: Recurrent</text>

  <rect x="280" y="410" width="155" height="32" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="357" y="430" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="500">Layer 8: Attention</text>

  <rect x="280" y="450" width="155" height="32" rx="6" fill="#f5f3ff" stroke="#8b5cf6" stroke-width="1"/>
  <text x="357" y="470" text-anchor="middle" fill="#6d28d9" font-size="10" font-weight="500">Layers 9-15: Recurrent</text>

  <rect x="280" y="490" width="155" height="32" rx="6" fill="#eff6ff" stroke="#3b82f6" stroke-width="1"/>
  <text x="357" y="510" text-anchor="middle" fill="#1d4ed8" font-size="10" font-weight="500">Layer 16: Attention</text>

  <text x="357" y="533" text-anchor="middle" fill="#9ca3af" font-size="11">... pattern repeats ...</text>

  <!-- Summary stats -->
  <text x="530" y="391" fill="#374151" font-size="10">48 to 64 layers (config-dependent)</text>
  <text x="530" y="409" fill="#374151" font-size="10">~7:1 recurrent-to-attention ratio</text>
  <text x="530" y="433" fill="#374151" font-size="10">~1 GB fixed memory (7B config)</text>
  <text x="530" y="451" fill="#374151" font-size="10">regardless of session length</text>
  <text x="530" y="481" fill="#374151" font-size="10">Thinking: [THINK]...[/THINK]</text>
  <text x="530" y="499" fill="#374151" font-size="10">Tool calls: [TOOL_CALL]...[TOOL_END]</text>

  <!-- Arrow: Concatenate → Backbone -->
  <line x1="690" y1="205" x2="690" y2="265" stroke="#64748b" stroke-width="1.5"/>
  <line x1="690" y1="265" x2="450" y2="265" stroke="#64748b" stroke-width="1.5"/>
  <line x1="450" y1="265" x2="450" y2="297" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ============ OUTPUT SPLIT ============ -->

  <!-- Split line from backbone -->
  <line x1="450" y1="525" x2="450" y2="570" stroke="#64748b" stroke-width="1.5"/>

  <!-- Fork -->
  <line x1="320" y1="570" x2="580" y2="570" stroke="#64748b" stroke-width="1.5"/>
  <line x1="320" y1="570" x2="320" y2="595" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="570" x2="580" y2="595" stroke="#64748b" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Gen Head -->
  <rect x="230" y="603" width="180" height="80" rx="10" fill="#eff6ff" stroke="#2563eb" stroke-width="2"/>
  <text x="320" y="632" text-anchor="middle" fill="#1d4ed8" font-size="14" font-weight="700">Gen Head</text>
  <text x="320" y="652" text-anchor="middle" fill="#4b5563" font-size="11">next token</text>
  <text x="320" y="670" text-anchor="middle" fill="#9ca3af" font-size="10">standard language modeling</text>

  <!-- Ver Head -->
  <rect x="490" y="603" width="180" height="80" rx="10" fill="#ecfdf5" stroke="#059669" stroke-width="2"/>
  <text x="580" y="632" text-anchor="middle" fill="#047857" font-size="14" font-weight="700">Ver Head</text>
  <text x="580" y="652" text-anchor="middle" fill="#4b5563" font-size="11">accuracy score [0, 1]</text>
  <text x="580" y="670" text-anchor="middle" fill="#9ca3af" font-size="10">per word, same pass, negligible cost</text>

  <!-- Bottom label -->
  <text x="450" y="712" text-anchor="middle" fill="#6b7280" font-size="10">Both heads read the same internal state in one forward pass. No second model. No extra inference cost.</text>

  <!-- Alchymia credit -->
  <text x="860" y="712" text-anchor="end" fill="#9ca3af" font-size="9">alchymia.ai</text>
</svg>
